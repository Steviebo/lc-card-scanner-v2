name: LC eBay Scanner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python src/main.py
        env:
          EBAY_OAUTH_TOKEN: ${{ secrets.EBAY_OAUTH_TOKEN }}